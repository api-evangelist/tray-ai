    description: The Tray.ai Platform API (also known as the Connectivity API) provides direct programmatic REST access to
      Tray's 700+ pre-built service connectors, authentication management, trigger subscriptions, user and workspace administration,
      and project/solution lifecycle operations. It is grouped into Core, CDK (Connector Development Kit), and On Premise
      endpoint families served from the US, EU, and APAC regions. All endpoints require a Bearer token and are rate limited
      to 30 requests per second (burst 50), with the Call Connector endpoint additionally capped at 1,000 concurrent requests.
