    description: The Tray.ai Embedded API is a GraphQL-based API that allows partners and customers to present in-app embedded
      integration experiences. It provides programmatic access to manage users, solutions, solution instances, authentications,
      workflows, and connector operations via HTTP POST to the GraphQL endpoint with Bearer token authentication. Two token
      types are supported, master tokens for admin operations and user tokens generated via the authorize mutation for
      user-scoped operations. All endpoints are rate limited to 30 requests per second.
