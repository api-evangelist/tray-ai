aid: tray-ai
url: >-
  https://raw.githubusercontent.com/api-evangelist/tray-ai/refs/heads/main/apis.yml
apis:
  - aid: tray-ai:embedded-api
    name: Tray.ai Embedded API
    tags:
      - Automation
      - Integration
      - GraphQL
      - Embedded
    humanURL: https://developer.tray.ai/openapi/embeddedapi-introduction/
    baseURL: https://tray.io/graphql
    properties:
      - url: https://developer.tray.ai/openapi/embeddedapi-introduction/
        type: Documentation
      - url: openapi/tray-ai-embedded-api-openapi.yml
        type: OpenAPI
      - url: https://www.postman.com/tray-docs/tray-io-s-public-workspace/collection/uo51x8u/tray-embedded-apis-graphql
        type: PostmanCollection
      - url: json-schema/user.json
        type: JSONSchema
      - url: json-schema/solution.json
        type: JSONSchema
      - url: json-schema/solution-instance.json
        type: JSONSchema
      - url: json-schema/authentication.json
        type: JSONSchema
      - url: json-ld/tray-ai-context.jsonld
        type: JSONLD
    description: >-
      The Tray.ai Embedded API is a GraphQL-based API that allows partners
      and customers to present in-app embedded integration experiences.
      It provides programmatic access to manage users, solutions, solution
      instances, authentications, workflows, and connector operations via
      HTTP POST to the GraphQL endpoint with Bearer token authentication.
  - aid: tray-ai:platform-api
    name: Tray.ai Platform API
    tags:
      - Automation
      - Integration
      - Connectors
      - iPaaS
    humanURL: https://developer.tray.ai/openapi/trayapi/overview/
    baseURL: https://api.tray.io/core/v1
    properties:
      - url: https://developer.tray.ai/openapi/trayapi/overview/
        type: Documentation
      - url: openapi/tray-ai-platform-api-openapi.yml
        type: OpenAPI
      - url: json-schema/connector.json
        type: JSONSchema
      - url: json-schema/authentication.json
        type: JSONSchema
      - url: json-schema/subscription.json
        type: JSONSchema
      - url: json-schema/user.json
        type: JSONSchema
      - url: json-schema/workspace.json
        type: JSONSchema
      - url: json-ld/tray-ai-context.jsonld
        type: JSONLD
    description: >-
      The Tray.ai Platform API (also known as the Connectivity API) provides
      direct programmatic REST access to Tray's 700+ pre-built service
      connectors, authentication management, trigger subscriptions, user and
      workspace administration, and project/solution lifecycle operations. It
      enables developers to integrate third-party service operations into their
      own applications without using the Builder UI.
