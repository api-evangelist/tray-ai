description: Tray.ai (formerly Tray.io) is an AI-ready enterprise orchestration platform for data and AI, combining a
  Merlin Agent Builder for no-code AI agent creation, an Agent Gateway for governed MCP server management, and an
  intelligent iPaaS with 700+ pre-built connectors. It exposes a REST Platform API (Connectivity API) and a GraphQL
  Embedded API for building, embedding, and operating AI agents and integration automations at enterprise scale.
