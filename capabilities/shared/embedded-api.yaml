naftiko: "1.0.0-alpha1"

info:
  label: "Tray.ai Embedded API"
  description: >-
    The Tray.ai Embedded API is a GraphQL-based API that allows partners and
    customers to present in-app embedded integration experiences. It provides
    programmatic access to manage users, solutions, solution instances,
    authentications, and workflows via Bearer token authentication.
  tags:
    - Automation
    - Embedded Integration
    - GraphQL
    - Integration
    - iPaaS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRAY_EMBEDDED_MASTER_TOKEN: TRAY_EMBEDDED_MASTER_TOKEN
      TRAY_EMBEDDED_USER_TOKEN: TRAY_EMBEDDED_USER_TOKEN

capability:
  consumes:
    - type: http
      namespace: tray-embedded
      baseUri: https://tray.io
      description: "Tray.ai Embedded GraphQL API for in-app integration experiences."
      authentication:
        type: bearer
        token: "{{TRAY_EMBEDDED_MASTER_TOKEN}}"
      resources:
        - name: users
          path: /graphql
          description: "Manage embedded external users"
          operations:
            - name: create-external-user
              method: POST
              description: "Creates a new external user for the embedded application"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-users
              method: POST
              description: "Retrieves a list of external users with pagination support"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-external-user
              method: POST
              description: "Updates an external user's properties"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-user
              method: POST
              description: "Removes an external user from the embedded application"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: authorize
              method: POST
              description: "Generates a user access token from a master token"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: solutions
          path: /graphql
          description: "Manage published solutions"
          operations:
            - name: get-solutions
              method: POST
              description: "Retrieves a list of published solutions available in the embedded application"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: solution-instances
          path: /graphql
          description: "Manage solution instances for end users"
          operations:
            - name: create-solution-instance
              method: POST
              description: "Creates a new solution instance from a published solution for an end user"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-solution-instances
              method: POST
              description: "Retrieves solution instances for a user or all users"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-solution-instance
              method: POST
              description: "Updates an existing solution instance"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-solution-instance
              method: POST
              description: "Deletes a solution instance and all associated data"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: authentications
          path: /graphql
          description: "Manage third-party service authentications for embedded users"
          operations:
            - name: create-user-authentication
              method: POST
              description: "Creates a new authentication for a third-party service for a user"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-authentications
              method: POST
              description: "Retrieves a list of authentications for third-party services"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-authentication
              method: POST
              description: "Deletes a third-party service authentication"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: workflows
          path: /graphql
          description: "Export and import workflows between embedded accounts"
          operations:
            - name: export-workflows
              method: POST
              description: "Exports workflows from the embedded account"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: import-workflows
              method: POST
              description: "Imports workflows into the embedded account from exported data"
              body:
                type: json
                data:
                  query: "{{tools.query}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: tray-embedded-rest
      resources:
        - path: /v1/users
          name: users
          description: "Manage embedded external users"
          operations:
            - method: POST
              name: create-external-user
              description: "Create a new external user in the embedded application"
              call: "tray-embedded.create-external-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/solutions
          name: solutions
          description: "Get available solutions"
          operations:
            - method: GET
              name: get-solutions
              description: "Get list of published solutions"
              call: "tray-embedded.get-solutions"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/solution-instances
          name: solution-instances
          description: "Manage solution instances"
          operations:
            - method: POST
              name: create-solution-instance
              description: "Create a solution instance for an end user"
              call: "tray-embedded.create-solution-instance"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: tray-embedded-mcp
      transport: http
      tools:
        - name: create-embedded-user
          description: "Create a new external user in the Tray.ai embedded application"
          hints:
            readOnly: false
            openWorld: false
          call: "tray-embedded.create-external-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-solutions
          description: "Get published solutions available in the embedded application"
          hints:
            readOnly: true
            openWorld: false
          call: "tray-embedded.get-solutions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-solution-instance
          description: "Create a solution instance from a published solution for an end user"
          hints:
            readOnly: false
            openWorld: false
          call: "tray-embedded.create-solution-instance"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-solution-instances
          description: "Get solution instances for a user or all users"
          hints:
            readOnly: true
            openWorld: false
          call: "tray-embedded.get-solution-instances"
          outputParameters:
            - type: object
              mapping: "$."
